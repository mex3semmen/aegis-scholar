name: verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run fast verify
        shell: pwsh
        run: npm run verify:fast

      - name: Run V1 scope check
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\scope-check-v1.ps1

      - name: Check whitespace in changed diff
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ("${{ github.event_name }}" -eq 'pull_request') {
              git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
              git diff --check "origin/${{ github.base_ref }}...HEAD"
          }
          elseif ("${{ github.event_name }}" -eq 'push') {
              if ((git rev-list --count HEAD) -gt 1) {
                  git diff --check HEAD~1..HEAD
              }
              else {
                  git show --check --format= HEAD
              }
          }
